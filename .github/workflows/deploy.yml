name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let in-progress production deploys finish — cancelling them mid-flight
# leaves the Pages backend stuck and fails subsequent deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pages backend failures are transient and self-heal on the next push,
    # so never fail the run (or email the owner) for them. Check the
    # Actions tab if the live site ever looks stale.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retrying failed deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - name: Deploy to GitHub Pages (retry)
        id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
